name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: DEBUG raw publish
        run: pnpm --filter "@waldjs/runtime" --filter "@waldjs/content" --filter "@waldjs/cli" --filter "@waldjs/canopy" --filter "@waldjs/compiler" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.WALDJS_KEY_3 }}

      - name: Create Version PR or publish to npm
        if: false
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.WALDJS_KEY_2 }}
